name: Continuous integration

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      Authentication__Auth0__Audience: https://hospital-coordination-api-test
      Authentication__Auth0__Domain: auth.test.local
      Authentication__Auth0__RoleClaim: https://hospital.test/claims/app_role
      HOSPITAL_TEST_CONNECTION_STRING: Host=127.0.0.1;Port=5432;Database=hospital_coordination;Username=hospital_app;Password=hospital_ci_only
      ConnectionStrings__HospitalDatabase: Host=127.0.0.1;Port=5432;Database=hospital_coordination;Username=hospital_app;Password=hospital_ci_only
      Frontend__Origin: http://localhost:5173

    services:
      postgres:
        image: postgres:18.4-alpine3.24@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_DB: hospital_coordination
          POSTGRES_USER: hospital_app
          POSTGRES_PASSWORD: hospital_ci_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hospital_app -d hospital_coordination"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json

      - name: Restore locked dependencies
        run: dotnet restore Hospital.slnx --locked-mode

      - name: Restore repository tools
        run: dotnet tool restore

      - name: Verify formatting
        run: dotnet format Hospital.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build Hospital.slnx --configuration Release --no-restore

      - name: Verify migration snapshot
        run: >-
          dotnet ef migrations has-pending-model-changes
          --project backend/Hospital.Infrastructure
          --startup-project backend/Hospital.Api
          --configuration Release
          --no-build

      - name: Test
        run: dotnet test Hospital.slnx --configuration Release --no-build --no-restore

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

  container:
    name: API container
    needs: backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Build API image
        run: docker build --file backend/Hospital.Api/Dockerfile --tag hospital-api:ci .
